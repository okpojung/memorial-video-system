version: '2'
services:
    nginx-proxy:
        image: nginxproxy/nginx-proxy
        container_name: nginx-proxy
        ports:
            - "80:80"
        volumes:
            - /var/run/docker.sock:/tmp/docker.sock:ro
            - ./setting/default.conf:/etc/nginx/vhost.d/default_location
        networks:
            - nginx-proxy
        restart: always
networks:
    nginx-proxy:
        name: nginx-proxy
